services:
  # 1. Python ML Inference Server
  - type: web
    name: veritas-python-ml
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: PORT
        value: 5000
      - key: GEMINI_API_KEY
        sync: false

  # 2. Node.js Express API & Static Web Server
  - type: web
    name: veritas-web-app
    env: node
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm --filter @workspace/api-server start
    envVars:
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: veritas-db
          property: connectionString
      - key: PYTHON_SERVER_URL
        fromService:
          name: veritas-python-ml
          property: host
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: veritas-db
    plan: free
